<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>观剧记录</title>
  <style>
    /* ================== 基础重置 ================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* 视觉规范 */
      --bg:        #f5f0e8;            /* 页面底色：米白 */
      --card:      #ffffff;            /* 卡片底色：白 */
      --ink:       #2c2c2c;            /* 主文字 */
      --ink-soft:  #888888;            /* 辅助文字 */
      --line:      #e8e3d8;            /* 边框/分割线 */
      --accent:    #3d6b4a;            /* 墨绿 */
      --accent-2:  #4d7d5a;            /* 墨绿 hover */

      /* 评分颜色 */
      --c-hang: #d0312d;
      --c-top:  #d4872a;
      --c-sup:  #8b5aa6;
      --c-npc:  #888888;
      --c-bad:  #222222;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ================== 入口页 ================== */
    #entry {
      position: fixed; inset: 0;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      cursor: pointer;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    #entry.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #entry .entry-text {
      font-size: 14px;
      color: #3d6b4a;
      letter-spacing: 1px;
      white-space: nowrap;
      max-width: 100vw;
      opacity: 0;
      animation: fadeIn 1.4s ease forwards 0.3s;
      text-align: center;
      padding: 0 16px;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ================== 主界面 ================== */
    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 20px 90px;        /* 底部留出 Tab 栏高度 */
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ===== 通用 头部 ===== */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 22px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 22px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 6px;
    }
    .add-btn {
      background: var(--accent);
      color: #ffffff;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:hover { background: var(--accent-2); }
    .add-btn:active { transform: scale(0.97); }

    /* ================== 首页：工具栏 ================== */
    .toolbar {
      display: flex; flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .toolbar-section { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toolbar-label {
      font-size: 13px; color: var(--ink-soft);
      min-width: 40px; letter-spacing: 1px;
    }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn, .sort-btn {
      background: #ffffff;
      border: 1.5px solid var(--line);
      color: var(--ink);
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn.active, .sort-btn.active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .search-input {
      flex: 1; min-width: 160px;
      padding: 9px 14px;
      border: 1.5px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      font-size: 13px; color: var(--ink);
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* ================== 首页：卡片 ================== */
    .grid {
      display: flex; flex-direction: column;
      gap: 22px; align-items: center;
    }
    .card {
      position: relative;
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border-radius: 16px;
      padding: 22px 22px 20px;
      border: 2px solid var(--line);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
      cursor: pointer;
      display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); }
    .card.r-hang { border-color: var(--c-hang); box-shadow: 0 0 18px rgba(208,49,45,0.35), 0 2px 8px rgba(0,0,0,0.04); }
    .card.r-top  { border-color: var(--c-top);  box-shadow: 0 0 18px rgba(212,135,42,0.38), 0 2px 8px rgba(0,0,0,0.04); }
    .card.r-sup  { border-color: var(--c-sup);  box-shadow: 0 0 18px rgba(139,90,166,0.35), 0 2px 8px rgba(0,0,0,0.04); }
    .card.r-npc  { border-color: var(--c-npc);  box-shadow: 0 0 18px rgba(110,110,110,0.30), 0 2px 8px rgba(0,0,0,0.04); }
    .card.r-bad  { border-color: var(--c-bad);  box-shadow: 0 0 18px rgba(26,26,26,0.35),  0 2px 8px rgba(0,0,0,0.06); }
    .card.r-hang:hover { box-shadow: 0 0 28px rgba(208,49,45,0.55), 0 6px 16px rgba(0,0,0,0.08); }
    .card.r-top:hover  { box-shadow: 0 0 28px rgba(212,135,42,0.58), 0 6px 16px rgba(0,0,0,0.08); }
    .card.r-sup:hover  { box-shadow: 0 0 28px rgba(139,90,166,0.55), 0 6px 16px rgba(0,0,0,0.08); }
    .card.r-npc:hover  { box-shadow: 0 0 28px rgba(110,110,110,0.45), 0 6px 16px rgba(0,0,0,0.08); }
    .card.r-bad:hover  { box-shadow: 0 0 28px rgba(26,26,26,0.55),  0 6px 16px rgba(0,0,0,0.10); }

    .card-top { padding-right: 80px; min-height: 30px; }
    .card-title {
      font-size: 19px; font-weight: 600;
      color: var(--ink); line-height: 1.3;
      word-break: break-word;
    }
    .card-meta {
      display: flex; flex-direction: column; gap: 6px;
      margin: 14px 0 16px;
      font-size: 13.5px; color: var(--ink-soft);
    }
    .meta-item { display: flex; align-items: center; gap: 6px; }
    .card-image {
      width: 60%; aspect-ratio: 16/9;
      margin: 0 auto;
      border-radius: 10px;
      overflow: hidden;
      background: #eee;
    }
    .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-tag {
      align-self: flex-start;
      margin-top: 16px;
      padding: 5px 14px;
      background: var(--accent);
      color: #ffffff;
      border-radius: 14px;
      font-size: 12px;
      letter-spacing: 2px;
    }
    .card-tag.online { background: #4a5d4a; }

    /* ================== 圆形评分印章 ================== */
    .stamp {
      position: absolute;
      top: 16px; right: 18px;
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800;
      letter-spacing: 1px;
      transform: rotate(-8deg);
      border: 4px solid var(--stamp-color, #000);
      outline: 2px solid var(--stamp-color, #000);
      outline-offset: -9px;
      color: var(--stamp-color, #000);
      background: rgba(255, 255, 255, 0.0);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.5),
        inset 0 2px 6px rgba(0,0,0,0.18),
        0 2px 3px rgba(0,0,0,0.12);
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }
    .stamp.long { font-size: 13px; letter-spacing: 0; }
    .stamp.s-hang { --stamp-color: var(--c-hang); background: rgba(208,49,45,0.05); }
    .stamp.s-top  { --stamp-color: var(--c-top);  background: rgba(212,135,42,0.05); }
    .stamp.s-sup  { --stamp-color: var(--c-sup);  background: rgba(139,90,166,0.05); }
    .stamp.s-npc  { --stamp-color: var(--c-npc);  background: rgba(110,110,110,0.05); }
    .stamp.s-bad  { --stamp-color: var(--c-bad);  background: rgba(26,26,26,0.05); }
    .detail-head .stamp { position: relative; top: auto; right: auto; flex-shrink: 0; }

    /* ================== 底部 Tab 栏 ================== */
    .tab-bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      display: flex;
      background: #ffffff;
      border-top: 1px solid var(--line);
      z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
    }
    .tab-item {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      font-size: 13px;
      color: var(--ink-soft);
      letter-spacing: 4px;
      transition: color 0.2s;
    }
    .tab-item.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* ================== 弹窗（通用） ================== */
    .modal-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center; justify-content: center;
      z-index: 999;
      padding: 20px;
    }
    .modal-mask.show { display: flex; }
    .modal {
      background: #ffffff;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 26px 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h2 {
      font-size: 20px; color: var(--accent);
      margin-bottom: 18px; font-weight: 600;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 13px; color: var(--ink-soft);
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .form-group label .req { color: var(--c-hang); }
    .form-group input[type="text"],
    .form-group input[type="date"],
    .form-group input[type="url"],
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      background: #ffffff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61,107,74,0.12);
    }
    .form-group textarea { resize: vertical; min-height: 84px; font-family: inherit; }

    /* 评分选择器：每个按钮按评分颜色 */
    .rating-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .rating-picker button {
      padding: 7px 16px;
      border-radius: 18px;
      border: 2px solid;
      background: #ffffff;
      font-size: 13px; font-weight: 600;
      transition: all 0.2s;
    }
    .rating-picker button[data-value="夯"]     { color: var(--c-hang); border-color: var(--c-hang); background: rgba(208,49,45,0.06); }
    .rating-picker button[data-value="顶级"]   { color: var(--c-top);  border-color: var(--c-top);  background: rgba(212,135,42,0.06); }
    .rating-picker button[data-value="人上人"] { color: var(--c-sup);  border-color: var(--c-sup);  background: rgba(139,90,166,0.06); }
    .rating-picker button[data-value="NPC"]    { color: var(--c-npc);  border-color: var(--c-npc);  background: rgba(110,110,110,0.06); }
    .rating-picker button[data-value="拉完了"] { color: var(--c-bad);  border-color: var(--c-bad);  background: rgba(26,26,26,0.06); }
    .rating-picker button[data-value="夯"].active     { background: var(--c-hang); color: #fff; }
    .rating-picker button[data-value="顶级"].active   { background: var(--c-top);  color: #fff; }
    .rating-picker button[data-value="人上人"].active { background: var(--c-sup);  color: #fff; }
    .rating-picker button[data-value="NPC"].active    { background: var(--c-npc);  color: #fff; }
    .rating-picker button[data-value="拉完了"].active { background: var(--c-bad);  color: #fff; }

    .image-upload { display: flex; align-items: center; gap: 12px; }
    .image-upload input[type="file"] { display: none; }
    .upload-btn {
      padding: 8px 14px;
      background: #ffffff;
      border: 1.5px dashed var(--line);
      border-radius: 8px;
      font-size: 13px; color: var(--ink-soft);
    }
    .upload-btn:hover { color: var(--accent); border-color: var(--accent); }
    .image-preview {
      max-width: 90px; max-height: 60px;
      border-radius: 6px; object-fit: cover;
    }
    /* SD 多图预览（可删除单张） */
    .sd-image-previews {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .sd-image-previews:empty { display: none; }
    .sd-img-item {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #f0ece4;
    }
    .sd-img-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sd-img-remove {
      position: absolute;
      top: 2px; right: 2px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    .sd-img-remove:hover { background: var(--c-hang); }

    /* SD 详情弹窗 */
    .modal-wide { max-width: 580px; width: 100%; }
    .sd-detail-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .sd-detail-head .sd-date-big {
      font-size: 24px; font-weight: 700; color: var(--accent);
      letter-spacing: 1px;
    }
    .sd-detail-head .sd-date-sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
    .sd-detail-head h2 {
      font-size: 20px; font-weight: 600; color: var(--ink);
      margin: 0 0 4px; word-break: break-word;
    }
    .sd-detail-related {
      font-size: 13px; color: var(--accent);
      margin-bottom: 14px;
    }
    .sd-detail-related:empty { display: none; }
    .sd-detail-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .sd-detail-images:empty { display: none; }
    .sd-detail-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 8px;
      cursor: zoom-in;
      background: #f0ece4;
      border: 1px solid var(--line);
      transition: transform 0.2s;
    }
    .sd-detail-img:hover { transform: scale(1.03); border-color: var(--accent); }
    .sd-detail-text {
      padding: 14px 16px;
      background: #faf7f1;
      border-radius: 8px;
      color: var(--ink);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 12px;
      font-size: 14px;
    }
    .sd-detail-text:empty { display: none; }
    /* 详情页底部操作条（关闭左、编辑右） */
    .sd-detail-actions {
      display: flex; justify-content: space-between;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .sd-detail-actions .left  { display: flex; gap: 10px; }
    .sd-detail-actions .right { display: flex; gap: 10px; }

    /* 图片放大灯箱 */
    .lightbox-mask {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      align-items: center; justify-content: center;
      z-index: 10000;
      padding: 24px;
      cursor: zoom-out;
    }
    .lightbox-mask.show { display: flex; animation: lbFade 0.2s ease-out; }
    .lightbox-img {
      max-width: 95vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      cursor: default;
    }
    .lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      font-size: 26px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.3); }
    @keyframes lbFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* 首页标题上方小字 */
    .home-tagline {
      text-align: center;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 2px;
      margin: 0 0 6px;
      font-style: italic;
    }

    /* 日历卡片（紧凑版） */
    .calendar-card {
      max-width: 420px;
      margin: 16px auto 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 12px 8px;
      box-shadow: 0 2px 10px rgba(60, 80, 60, 0.04);
    }
    .calendar-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .cal-title { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: 1px; }
    .cal-nav {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #faf7f1;
      border: 1px solid var(--line);
      font-size: 16px; line-height: 1;
      color: var(--ink-soft);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      transition: all 0.2s;
    }
    .cal-nav:hover { color: var(--accent); border-color: var(--accent); }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 1px;
      padding: 4px 0;
      border-bottom: 1px solid var(--line);
    }
    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding-top: 4px;
    }
    .cal-cell {
      aspect-ratio: 1 / 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding-top: 4px;
      border-radius: 6px;
      font-size: 11px;
      color: var(--ink);
      cursor: default;
      position: relative;
      transition: background 0.2s;
      min-width: 0;
      overflow: hidden;
    }
    .cal-cell.empty { visibility: hidden; }
    .cal-cell.clickable { cursor: pointer; }
    .cal-cell.clickable:hover { background: #f5f0e8; }
    .cal-cell.today {
      outline: 1.5px solid var(--accent);
      outline-offset: -1.5px;
      font-weight: 700;
      color: var(--accent);
    }
    .cal-cell .day-num { line-height: 1; font-size: 11px; }
    /* 当日有剧：每场一个圆点，多场时横排，最多 3 个 + "+N" */
    .cal-cell .day-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-top: 3px;
      min-height: 6px;
    }
    .cal-cell .day-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent);
    }
    .cal-cell .day-more {
      font-size: 8px;
      color: var(--ink-soft);
      line-height: 1;
      margin-left: 1px;
      font-weight: 500;
    }
    .cal-legend {
      display: flex; flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      font-size: 10px;
      color: var(--ink-soft);
      justify-content: center;
    }
    .cal-legend-item { display: inline-flex; align-items: center; gap: 4px; }
    .cal-legend-item .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    /* 当日记录列表 */
    .day-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .day-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: #faf7f1;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid transparent;
    }
    .day-item:hover { background: #f0ece4; border-color: var(--accent); }
    .day-item .di-name { flex: 1; font-size: 14px; color: var(--ink); font-weight: 500; }
    .day-item .di-meta { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
    .day-item .di-stamp {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      line-height: 1; letter-spacing: 0;
      flex-shrink: 0;
      text-align: center;
      /* 防止 3 字评分（人上人/拉完了）超出圆圈 */
      padding: 0;
      word-break: keep-all;
    }
    .day-item .di-stamp.long { font-size: 8px; }
    .day-empty { text-align: center; padding: 24px; color: var(--ink-soft); font-size: 13px; }

    .modal-actions {
      display: flex; justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
    .btn-ghost { background: var(--bg); color: var(--ink); border-color: var(--line); }
    .btn-ghost:hover { background: #ece6dc; }
    .btn-danger { background: #fff; color: var(--c-hang); border-color: var(--c-hang); }
    .btn-danger:hover { background: var(--c-hang); color: #fff; }

    /* 详情弹窗 */
    .detail-head {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 14px;
    }
    .detail-head h2 { margin-bottom: 0; flex: 1; word-break: break-word; }
    .detail-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 14px;
      display: block;
    }
    .detail-seat {
      background: rgba(61,107,74,0.08);
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 14px;
      text-align: center;
      border: 1px dashed var(--accent);
      letter-spacing: 2px;
    }
    .detail-row {
      display: flex; gap: 12px;
      padding: 8px 0;
      border-bottom: 1px dashed var(--line);
      font-size: 14px;
    }
    .detail-row:last-of-type { border-bottom: none; }
    .detail-row .k { color: var(--ink-soft); min-width: 60px; letter-spacing: 1px; }
    .detail-row .v { color: var(--ink); flex: 1; word-break: break-word; }
    .detail-comment {
      background: var(--bg);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px; line-height: 1.7;
      margin-top: 12px; color: var(--ink);
      white-space: pre-wrap;
      border-left: 3px solid var(--accent);
    }

    .empty {
      width: 100%;
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft); font-size: 14px;
    }

    /* ================== 统计板块 ================== */
    .stats-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 6px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      text-align: left;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .stat-card .stat-label {
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .stat-card .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }
    .stat-card .stat-sub {
      font-size: 10px;
      color: var(--ink-soft);
      margin-top: 3px;
    }

    .bar-chart {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px 14px 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .bar-chart-title {
      font-size: 14px;
      color: var(--ink);
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .bar-chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 180px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      min-width: 0;
    }
    .bar-value {
      font-size: 10px;
      color: var(--ink-soft);
      margin-bottom: 4px;
      min-height: 14px;
    }
    .bar {
      width: 70%;
      max-width: 22px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: height 0.5s ease;
    }
    .bar.zero {
      background: #e8e3d8;
      min-height: 2px;
    }
    .bar-label {
      font-size: 10px;
      color: var(--ink-soft);
      margin-top: 6px;
      text-align: center;
    }

    /* ================== 数据导入导出工具 ================== */
    .data-tools {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
      padding-top: 4px;
    }
    .btn-export,
    .btn-import {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      font-family: inherit;
    }
    .btn-export {
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
    }
    .btn-export:hover { opacity: 0.88; }
    .btn-export:active { opacity: 0.78; }
    .btn-import {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-import:hover { background: rgba(61, 107, 74, 0.06); }
    .btn-import:active { background: rgba(61, 107, 74, 0.12); }
    /* 视觉隐藏的 file input：不使用 display:none 避免移动端 click() 失效 */
    .hidden-file {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    /* ================== SD 日记板块：时间轴 ================== */
    .sd-add-bar {
      display: flex; justify-content: flex-end;
      margin-bottom: 18px;
    }
    .timeline {
      position: relative;
    }
    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 18px;
      position: relative;
    }
    .timeline-date {
      flex-shrink: 0;
      width: 60px;
      text-align: right;
      font-size: 13px;
      color: var(--ink-soft);
      padding-top: 6px;
      padding-right: 12px;
      line-height: 1.3;
    }
    .timeline-date .d-day {
      display: block;
      font-size: 18px;
      color: var(--ink);
      font-weight: 600;
    }
    .timeline-marker {
      position: relative;
      width: 20px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
      align-self: stretch;
    }
    .timeline-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      z-index: 2;
      margin-top: 8px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(61,107,74,0.15);
    }
    /* 竖线贯穿：连接到下一项 */
    .timeline-marker::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 22px;
      bottom: -18px;
      width: 2px;
      background: var(--accent);
      transform: translateX(-50%);
      z-index: 1;
    }
    .timeline-item:last-child .timeline-marker::after {
      display: none;
    }
    .timeline-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-left: 0;
    }
    .timeline-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }
    .sd-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .sd-related {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .sd-images {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0 10px;
    }
    .sd-images img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    .sd-text {
      font-size: 13.5px;
      color: var(--ink);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ================== 观剧月历：锁死一屏（100dvh，无滚动） ================== */
    .view.view-stats.active {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      height: 100vh;            /* 兼容旧浏览器 */
      height: 100dvh;           /* 优先使用动态视口高度 */
      display: flex;
      flex-direction: column;
      padding: 8px 12px;
      padding-bottom: calc(48px + env(safe-area-inset-bottom, 0px));  /* 48px = 底部 Tab 栏高度 */
      background: var(--bg);
      overflow: hidden;
      z-index: 50;
      box-sizing: border-box;
    }

    /* 观剧月历内部各区块：上下固定高度，中间 flex:1 自动填满 */
    .view-stats .header {
      flex-shrink: 0;
      padding: 4px 0 8px;
      margin-bottom: 6px;
    }
    .view-stats .header h1 { font-size: 20px; letter-spacing: 4px; }
    .view-stats .stats-cards {
      flex-shrink: 0;
      margin-bottom: 6px;
    }
    .view-stats .stat-card { padding: 6px 8px; }
    .view-stats .stat-card .stat-label { font-size: 10px; margin-bottom: 1px; }
    .view-stats .stat-card .stat-value { font-size: 18px; }
    .view-stats .stat-card .stat-sub { font-size: 9px; margin-top: 1px; }

    /* 日历：占用剩余空间，内部 flex 让格子按需缩小 */
    .view-stats .calendar-card {
      flex: 1 1 0;
      min-height: 0;
      max-width: 360px;
      width: 100%;
      margin: 0 auto 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .view-stats .cal-weekdays { flex-shrink: 0; }
    .view-stats .cal-days {
      flex: 1 1 0;
      min-height: 0;
      align-content: start;
    }
    .view-stats .cal-cell { font-size: 10px; }

    /* 柱状图：固定高度在底部 */
    .view-stats .bar-chart {
      flex-shrink: 0;
      margin-top: 0;
      padding: 8px 10px 4px;
    }
    .view-stats .bar-chart-title { font-size: 12px; margin-bottom: 4px; letter-spacing: 1px; }
    .view-stats .bar-chart-bars { height: 70px; gap: 3px; }
    .view-stats .bar-value { font-size: 9px; margin-bottom: 2px; min-height: 12px; }
    .view-stats .bar-label { font-size: 8px; margin-top: 3px; }

    /* 数据导入导出：在观剧月历内占固定高度 */
    .view-stats .data-tools {
      flex-shrink: 0;
      margin-top: 8px;
    }

    /* ================== 响应式：观剧月历移动端进一步压缩 ================== */
    @media (max-width: 640px) {
      .view.view-stats.active {
        padding: 6px 8px;
        padding-bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      }
      .view-stats .header { padding: 2px 0 4px; margin-bottom: 4px; }
      .view-stats .header h1 { font-size: 16px; letter-spacing: 3px; }
      .view-stats .stats-cards { gap: 4px; margin-bottom: 4px; }
      .view-stats .stat-card { padding: 4px 6px; border-radius: 8px; }
      .view-stats .stat-card .stat-label { font-size: 9px; }
      .view-stats .stat-card .stat-value { font-size: 16px; }
      .view-stats .stat-card .stat-sub { font-size: 8px; }
      .view-stats .calendar-card { max-width: 100%; padding: 6px 6px 4px; margin-bottom: 4px; }
      .view-stats .cal-weekdays { font-size: 9px; padding: 1px 0; }
      .view-stats .cal-cell { font-size: 9px; padding-top: 2px; border-radius: 3px; }
      .view-stats .cal-cell .day-num { font-size: 9px; }
      .view-stats .cal-cell .day-dots { gap: 2px; margin-top: 2px; }
      .view-stats .cal-cell .day-dot { width: 4px; height: 4px; }
      .view-stats .cal-cell .day-more { font-size: 7px; }
      .view-stats .bar-chart { padding: 6px 8px 2px; }
      .view-states .bar-chart-title,
      .view-stats .bar-chart-title { font-size: 11px; margin-bottom: 2px; }
      .view-stats .bar-chart-bars { height: 56px; }
      .view-stats .data-tools { margin-top: 4px; gap: 6px; }
      .view-stats .btn-export,
      .view-stats .btn-import { padding: 5px 12px; font-size: 11px; border-radius: 6px; }
    }
    @media (max-width: 640px) {
      .app { padding: 12px 10px 90px; }
      .header { margin-bottom: 8px; }
      .header h1 { font-size: 20px; letter-spacing: 3px; }
      .add-btn { padding: 6px 12px; font-size: 12px; }
      .toolbar { padding: 12px; }
      .toolbar-section { flex-direction: column; align-items: flex-start; gap: 6px; }
      .search-input { width: 100%; }
      .card { max-width: 100%; padding: 16px; }
      .stamp { width: 50px; height: 50px; font-size: 13px; top: 12px; right: 12px;
               border-width: 2.5px; outline-offset: -7px; }
      .stamp.long { font-size: 11px; }
      .card-top { padding-right: 60px; }
      .modal { padding: 18px 16px; }
      /* 统计三板块紧凑显示：4 卡一行 + 小日历 + 矮柱图 */
      .stats-cards { grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; }
      .stat-card { padding: 8px 8px; border-radius: 10px; }
      .stat-card .stat-label { font-size: 9px; letter-spacing: 0; margin-bottom: 2px; }
      .stat-card .stat-value { font-size: 18px; }
      .stat-card .stat-sub { font-size: 9px; margin-top: 1px; }
      .calendar-card { max-width: 320px; padding: 8px 8px 4px; margin: 8px auto; border-radius: 12px; }
      .calendar-header { margin-bottom: 4px; }
      .cal-title { font-size: 12px; letter-spacing: 0; }
      .cal-nav { width: 22px; height: 22px; font-size: 13px; }
      .cal-weekdays { font-size: 9px; padding: 2px 0; letter-spacing: 0; }
      .cal-days { gap: 1px; padding-top: 2px; }
      .cal-cell { font-size: 10px; border-radius: 4px; }
      .cal-cell .day-num { font-size: 10px; }
      .cal-cell .day-dots { gap: 2px; margin-top: 2px; }
      .cal-cell .day-dot { width: 4px; height: 4px; }
      .cal-cell .day-more { font-size: 7px; }
      .cal-legend { display: none; }
      .bar-chart { padding: 10px 8px 8px; margin-top: 8px; }
      .bar-chart-title { font-size: 12px; margin-bottom: 6px; }
      .bar-chart-bars { height: 90px; gap: 3px; }
      .bar-value { font-size: 9px; }
      .bar-label { font-size: 8px; }
      .timeline-date { width: 50px; }
      .timeline-date .d-day { font-size: 16px; }
      .tab-item { font-size: 12px; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

  <!-- ================== 入口页 ================== -->
  <div id="entry">
    <div class="entry-text">『温馨提示：请控制灵魂对剧场的渴望』</div>
  </div>

  <!-- ================== 主界面 ================== -->
  <div class="app" id="app" style="display:none;">

    <!-- ====== 视图：首页 ====== -->
    <div class="view view-home active" id="viewHome">
      <div class="home-tagline">就算有坏事发生，还能在剧场做梦</div>
      <div class="header">
        <h1>观剧记录</h1>
        <button class="add-btn" id="addBtn">+ 添加记录</button>
      </div>

      <div class="toolbar">
        <div class="toolbar-section">
          <span class="toolbar-label">筛选</span>
          <div class="btn-group">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="线下">线下</button>
            <button class="filter-btn" data-filter="线上">线上</button>
          </div>
        </div>
        <div class="toolbar-section">
          <span class="toolbar-label">排序</span>
          <div class="btn-group">
            <button class="sort-btn active" data-sort="date">按日期 ↓</button>
            <button class="sort-btn" data-sort="rating">按评分 ↓</button>
          </div>
        </div>
        <div class="toolbar-section">
          <span class="toolbar-label">搜索</span>
          <input type="text" class="search-input" id="searchInput" placeholder="按剧名搜索...">
        </div>
      </div>

      <div class="grid" id="grid"></div>
    </div>

    <!-- ====== 视图：统计 ====== -->
    <div class="view view-stats" id="viewStats">
      <div class="header">
        <h1>观剧月历</h1>
      </div>

      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-label">总场次</div>
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-sub">累计记录</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">平均评分</div>
          <div class="stat-value" id="statAvg">-</div>
          <div class="stat-sub" id="statAvgLabel">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">线下</div>
          <div class="stat-value" id="statOffline">0</div>
          <div class="stat-sub">剧场观演</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">线上</div>
          <div class="stat-value" id="statOnline">0</div>
          <div class="stat-sub">在线观演</div>
        </div>
      </div>

      <div class="calendar-card">
        <div class="calendar-header">
          <button type="button" class="cal-nav" id="calPrev">‹</button>
          <div class="cal-title" id="calTitle">2026 年 7 月</div>
          <button type="button" class="cal-nav" id="calNext">›</button>
        </div>
        <div class="cal-weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span>
          <span>四</span><span>五</span><span>六</span>
        </div>
        <div class="cal-days" id="calDays"></div>
        <div class="cal-legend">
          <span class="cal-legend-item"><i class="dot" style="background:var(--c-hang)"></i>夯</span>
          <span class="cal-legend-item"><i class="dot" style="background:var(--c-top)"></i>顶级</span>
          <span class="cal-legend-item"><i class="dot" style="background:var(--c-sup)"></i>人上人</span>
          <span class="cal-legend-item"><i class="dot" style="background:var(--c-npc)"></i>NPC</span>
          <span class="cal-legend-item"><i class="dot" style="background:var(--c-bad)"></i>拉完了</span>
        </div>
      </div>

      <div class="bar-chart">
        <div class="bar-chart-title">近 12 个月观剧数量</div>
        <div class="bar-chart-bars" id="barChart"></div>
      </div>

      <!-- 数据导入导出工具栏 -->
      <div class="data-tools">
        <button type="button" class="btn-export" id="exportDataBtn">导出数据</button>
        <label class="btn-import" for="importFileInput" id="importLabel">导入数据</label>
        <input type="file" id="importFileInput" class="hidden-file" accept=".json,application/json">
      </div>
    </div>

    <!-- ====== 视图：SD 小记 ====== -->
    <div class="view view-sd" id="viewSd">
      <div class="header">
        <h1>SD 小记</h1>
        <button class="add-btn" id="addSDBtn">+ 添加小记</button>
      </div>

      <div class="timeline" id="sdList"></div>
    </div>

  </div>

  <!-- ================== 底部 Tab 栏 ================== -->
  <nav class="tab-bar" id="tabBar">
    <button class="tab-item active" data-view="home">剧场记忆</button>
    <button class="tab-item" data-view="stats">观剧月历</button>
    <button class="tab-item" data-view="sd">SD 小记</button>
  </nav>

  <!-- ================== 剧目表单弹窗 ================== -->
  <div class="modal-mask" id="formModal">
    <div class="modal">
      <h2 id="formTitle">添加记录</h2>
      <form id="recordForm">
        <div class="form-group">
          <label>剧名 <span class="req">*</span></label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group">
          <label>日期 <span class="req">*</span></label>
          <input type="date" name="date" required>
        </div>
        <div class="form-group"><label>地点</label>
          <input type="text" name="location" placeholder="例如：上海">
        </div>
        <div class="form-group"><label>剧院</label>
          <input type="text" name="theater" placeholder="例如：上海大剧院">
        </div>
        <div class="form-group"><label>卡司</label>
          <input type="text" name="cast" placeholder="例如：张三 饰 男主">
        </div>
        <div class="form-group"><label>座位号</label>
          <input type="text" name="seat" placeholder="例如：5排12座">
        </div>
        <div class="form-group"><label>观看方式</label>
          <select name="method">
            <option value="线下">线下</option>
            <option value="线上">线上</option>
          </select>
        </div>
        <div class="form-group">
          <label>评分</label>
          <div class="rating-picker" id="ratingPicker">
            <button type="button" data-value="夯">夯</button>
            <button type="button" data-value="顶级">顶级</button>
            <button type="button" data-value="人上人">人上人</button>
            <button type="button" data-value="NPC">NPC</button>
            <button type="button" data-value="拉完了">拉完了</button>
          </div>
        </div>
        <div class="form-group"><label>点评 / 观后感</label>
          <textarea name="comment" placeholder="记录你的观后感..."></textarea>
        </div>
        <div class="form-group">
          <label>图片（可选，最多 1 张）</label>
          <div class="image-upload">
            <label class="upload-btn">选择图片
              <input type="file" id="imageInput" accept="image/*">
            </label>
            <img class="image-preview" id="imagePreview" style="display:none;" alt="预览">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="formCancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ================== 剧目详情弹窗 ================== -->
  <div class="modal-mask" id="detailModal">
    <div class="modal" id="detailContent"></div>
  </div>

  <!-- ================== SD 表单弹窗 ================== -->
  <div class="modal-mask" id="sdFormModal">
    <div class="modal">
      <h2 id="sdFormTitle">添加 SD</h2>
      <form id="sdForm">
        <div class="form-group">
          <label>日期 <span class="req">*</span></label>
          <input type="date" name="date">
        </div>
        <div class="form-group">
          <label>演出名称 <span class="req">*</span></label>
          <input type="text" name="showName" placeholder="例如：剧院魅影 SD">
        </div>
        <div class="form-group">
          <label>关联剧目（可选）</label>
          <select name="relatedShow" id="sdRelatedSelect">
            <option value="">— 无 —</option>
          </select>
        </div>
        <div class="form-group">
          <label>图片（可选，多张，自动压缩）</label>
          <div class="image-upload">
            <label class="upload-btn" for="sdImageInput">选择图片</label>
            <input type="file" id="sdImageInput" accept="image/*" multiple>
          </div>
          <div class="sd-image-previews" id="sdImagePreviews"></div>
        </div>
        <div class="form-group">
          <label>日记文字</label>
          <textarea name="text" placeholder="记录今天的SD活动..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="sdFormCancel">取消</button>
          <button type="button" class="btn btn-primary" id="sdFormSave">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ================== SD 详情弹窗 ================== -->
  <div class="modal-mask" id="sdDetailModal">
    <div class="modal modal-wide" id="sdDetailContent"></div>
  </div>

  <!-- ================== 图片放大灯箱 ================== -->
  <div class="lightbox-mask" id="lightbox">
    <button class="lightbox-close" type="button" aria-label="关闭">×</button>
    <img class="lightbox-img" id="lightboxImg" alt="">
  </div>

  <!-- ================== 日历某天记录弹窗 ================== -->
  <div class="modal-mask" id="dayModal">
    <div class="modal">
      <h2 id="dayModalTitle">当日记录</h2>
      <div id="dayModalList" class="day-list"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="dayModalClose">关闭</button>
      </div>
    </div>
  </div>

  <script>
    /* ================== 评分映射 ================== */
    const RATING_KEY = { '夯':'hang', '顶级':'top', '人上人':'sup', 'NPC':'npc', '拉完了':'bad' };
    const RATING_RANK = { '夯':5, '顶级':4, '人上人':3, 'NPC':2, '拉完了':1 };
    const RANK_TO_LABEL = { 5:'夯', 4:'顶级', 3:'人上人', 2:'NPC', 1:'拉完了' };
    const RANK_TO_TEXT  = { 5:'夯到不行', 4:'顶级享受', 3:'人上人', 2:'中规中矩', 1:'一言难尽' };

    const STORAGE_KEY = 'theater_diary_v1';
    const SD_STORAGE_KEY = 'kanju_sd';

    /* ================== 预置 4 条示例 ================== */
    const SAMPLE_DATA = [
      { id:'s1', name:'剧院魅影', date:'2026-05-12', location:'上海', theater:'上海大剧院',
        cast:'某某 饰 魅影', seat:'5排12座', method:'线下', rating:'夯',
        comment:'震撼到说不出话，舞美和唱功都是顶级水准。',
        image:'https://picsum.photos/seed/theater1/600/400' },
      { id:'s2', name:'歌剧魅影 25 周年', date:'2026-04-08', location:'', theater:'', cast:'', seat:'',
        method:'线上', rating:'顶级', comment:'经典版本，值得反复看。',
        image:'https://picsum.photos/seed/theater2/600/400' },
      { id:'s3', name:'摇滚红与黑', date:'2026-03-22', location:'北京', theater:'天桥艺术中心',
        cast:'某某 饰 于连', seat:'3排8座', method:'线下', rating:'人上人',
        comment:'卡司唱功在线，整体氛围很燃。',
        image:'https://picsum.photos/seed/theater3/600/400' },
      { id:'s4', name:'某小众音乐剧', date:'2026-02-14', location:'广州', theater:'广州大剧院',
        cast:'', seat:'8排20座', method:'线下', rating:'NPC',
        comment:'中规中矩，没有特别出彩的地方。',
        image:'https://picsum.photos/seed/theater4/600/400' }
    ];

    const SAMPLE_SD = [
      { id:'sd1', date:'2026-05-12', showName:'剧院魅影 SD',
        relatedShow:'', images:['https://picsum.photos/seed/sd1/400/400'],
        text:'今天和魅影的演员合影了！超级激动，签名也很温柔。' }
    ];

    /* ================== 状态 ================== */
    let records = [];
    let sdRecords = [];
    let currentView = 'home';
    let filterType = 'all';
    let sortType = 'date';
    let currentRating = '';
    let currentImage = null;
    let editingId = null;
    let editingSDId = null;
    let currentSDImages = [];          /* SD 当前待保存的图片数组（base64 或 URL） */
    const SD_MAX_IMAGES = 4;            /* 最多 4 张，防止 LocalStorage 溢出 */

    /* ================== 工具 ================== */
    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function formatDay(d) {
      if (!d) return '';
      const parts = d.split('-');
      if (parts.length !== 3) return d;
      return parts[1] + '/' + parts[2];
    }
    function formatMonth(d) {
      if (!d) return '';
      const parts = d.split('-');
      if (parts.length !== 3) return d;
      return parts[1] + '月';
    }

    /* ================== 数据存取 ================== */
    function loadRecords() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { records = JSON.parse(stored); }
        catch (e) { records = [...SAMPLE_DATA]; saveRecords(); }
      } else {
        records = [...SAMPLE_DATA];
        saveRecords();
      }
    }
    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }
    function loadSDRecords() {
      const stored = localStorage.getItem(SD_STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          /* 数据迁移：确保每条记录的 images 都是数组 */
          sdRecords = (parsed || []).map(r => ({
            ...r,
            images: Array.isArray(r.images)
              ? r.images
              : (typeof r.images === 'string' && r.images.trim()
                  ? r.images.split(',').map(s => s.trim()).filter(Boolean)
                  : [])
          }));
        }
        catch (e) { sdRecords = [...SAMPLE_SD]; saveSDRecords(); }
      } else {
        sdRecords = [...SAMPLE_SD];
        saveSDRecords();
      }
    }
    function saveSDRecords() {
      localStorage.setItem(SD_STORAGE_KEY, JSON.stringify(sdRecords));
    }
    function genId() {
      return 'r' + Date.now() + Math.floor(Math.random() * 1000);
    }
    function genSDId() {
      return 'sd' + Date.now() + Math.floor(Math.random() * 1000);
    }

    /* ================== 视图切换 ================== */
    function switchView(view) {
      currentView = view;
      ['Home', 'Stats', 'Sd'].forEach(v => {
        const el = document.getElementById('view' + v);
        if (el) el.classList.toggle('active', v.toLowerCase() === view);
      });
      document.querySelectorAll('.tab-item').forEach(t => {
        t.classList.toggle('active', t.dataset.view === view);
      });
      if (view === 'home') render();
      else if (view === 'stats') renderStats();
      else if (view === 'sd') renderSD();
    }

    /* ================== 首页渲染 ================== */
    function render() {
      const grid = document.getElementById('grid');
      const search = document.getElementById('searchInput').value.trim().toLowerCase();

      let list = records.filter(r => {
        if (filterType !== 'all' && r.method !== filterType) return false;
        if (search && !r.name.toLowerCase().includes(search)) return false;
        return true;
      });

      if (sortType === 'date') {
        list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      } else {
        list.sort((a, b) => (RATING_RANK[b.rating] || 0) - (RATING_RANK[a.rating] || 0));
      }

      if (list.length === 0) {
        grid.innerHTML = '<div class="empty">— 还没有记录，点右上角添加第一篇吧 —</div>';
        return;
      }

      grid.innerHTML = list.map(r => {
        const key = RATING_KEY[r.rating] || '';
        const isLong = r.rating && r.rating.length > 2;
        const meta = [];
        if (r.date)     meta.push(`<div class="meta-item">📅 &nbsp;${esc(r.date)}</div>`);
        if (r.location) meta.push(`<div class="meta-item">📍 &nbsp;${esc(r.location)}</div>`);
        if (r.seat)     meta.push(`<div class="meta-item">💺 &nbsp;${esc(r.seat)}</div>`);
        const imageHtml = r.image
          ? `<div class="card-image"><img src="${esc(r.image)}" alt=""></div>` : '';

        return `
          <div class="card r-${key}" data-id="${esc(r.id)}">
            <div class="card-top"><div class="card-title">${esc(r.name)}</div></div>
            <div class="stamp s-${key} ${isLong ? 'long' : ''}">${esc(r.rating)}</div>
            <div class="card-meta">${meta.join('')}</div>
            ${imageHtml}
            <div class="card-tag ${r.method === '线上' ? 'online' : ''}">${esc(r.method)}</div>
          </div>
        `;
      }).join('');

      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => showDetail(card.dataset.id));
      });
    }

    /* ================== 统计渲染 ================== */
    function renderStats() {
      const total = records.length;
      const online = records.filter(r => r.method === '线上').length;
      const offline = records.filter(r => r.method === '线下').length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statOnline').textContent = online;
      document.getElementById('statOffline').textContent = offline;

      // 平均评分
      const ranks = records.filter(r => RATING_RANK[r.rating])
                           .map(r => RATING_RANK[r.rating]);
      if (ranks.length === 0) {
        document.getElementById('statAvg').textContent = '-';
        document.getElementById('statAvgLabel').textContent = '—';
      } else {
        const avg = ranks.reduce((a, b) => a + b, 0) / ranks.length;
        document.getElementById('statAvg').textContent = avg.toFixed(1);
        const nearest = Math.round(avg);
        document.getElementById('statAvgLabel').textContent = RANK_TO_TEXT[nearest] || '—';
      }

      // 近 12 个月柱状图
      const now = new Date();
      const months = [];
      for (let i = 11; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        const count = records.filter(r => (r.date || '').startsWith(ym)).length;
        months.push({ ym, label: (d.getMonth() + 1) + '月', count });
      }
      const max = Math.max(1, ...months.map(m => m.count));

      const html = months.map(m => {
        const h = m.count === 0 ? 2 : (m.count / max * 100);
        return `
          <div class="bar-col">
            <div class="bar-value">${m.count || ''}</div>
            <div class="bar ${m.count === 0 ? 'zero' : ''}" style="height:${h}%"></div>
            <div class="bar-label">${m.label}</div>
          </div>
        `;
      }).join('');
      document.getElementById('barChart').innerHTML = html;

      /* 渲染日历 */
      renderCalendar();
    }

    /* ================== 日历 ================== */
    const RATING_COLOR = {
      '夯':    'var(--c-hang)',
      '顶级':  'var(--c-top)',
      '人上人':'var(--c-sup)',
      'NPC':   'var(--c-npc)',
      '拉完了':'var(--c-bad)'
    };
    /* 当前查看的月份（默认本月） */
    const now = new Date();
    let currentCalYear  = now.getFullYear();
    let currentCalMonth = now.getMonth();   /* 0-11 */

    document.getElementById('calPrev').addEventListener('click', () => {
      currentCalMonth--;
      if (currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; }
      renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', () => {
      currentCalMonth++;
      if (currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; }
      renderCalendar();
    });

    function renderCalendar() {
      const year  = currentCalYear;
      const month = currentCalMonth;
      document.getElementById('calTitle').textContent = `${year} 年 ${month + 1} 月`;

      /* 当月第一天是周几 (0=日) */
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const todayStr = (() => {
        const t = new Date();
        return t.getFullYear() + '-' +
               String(t.getMonth() + 1).padStart(2, '0') + '-' +
               String(t.getDate()).padStart(2, '0');
      })();

      /* 把每条记录按 day 索引 */
      const byDay = {};
      records.forEach(r => {
        if (!r.date) return;
        if (r.date.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`)) {
          const day = parseInt(r.date.substring(8, 10), 10);
          (byDay[day] = byDay[day] || []).push(r);
        }
      });

      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push({ empty: true });
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        cells.push({
          day: d,
          date: dateStr,
          isToday: dateStr === todayStr,
          records: byDay[d] || []
        });
      }
      /* 按需补齐到完整行（4/5/6 行自适应，避免留白） */
      const rowsNeeded = Math.ceil(cells.length / 7);
      while (cells.length < rowsNeeded * 7) cells.push({ empty: true });

      const html = cells.map(c => {
        if (c.empty) return `<div class="cal-cell empty"></div>`;
        const { day, date, isToday, records: rs } = c;
        if (!rs.length) {
          return `<div class="cal-cell${isToday ? ' today' : ''}" data-date="${date}"><span class="day-num">${day}</span></div>`;
        }
        /* 按评分从高到低排序，高分在前 */
        const sorted = [...rs].sort((a, b) => (RATING_RANK[b.rating] || 0) - (RATING_RANK[a.rating] || 0));
        /* 最多展示 3 个圆点 + "+N" 标记 */
        const visibleDots = sorted.slice(0, 3);
        const more = sorted.length - visibleDots.length;
        const dotsHtml = visibleDots.map(r => {
          const c2 = RATING_COLOR[r.rating] || 'var(--accent)';
          return `<span class="day-dot" style="background:${c2}"></span>`;
        }).join('');
        const moreHtml = more > 0 ? `<span class="day-more">+${more}</span>` : '';
        const dotsBlock = `<div class="day-dots">${dotsHtml}${moreHtml}</div>`;
        return `<div class="cal-cell clickable${isToday ? ' today' : ''}" data-date="${date}"><span class="day-num">${day}</span>${dotsBlock}</div>`;
      }).join('');

      const daysEl = document.getElementById('calDays');
      daysEl.innerHTML = html;
      daysEl.querySelectorAll('.cal-cell.clickable').forEach(cell => {
        cell.addEventListener('click', () => openDayModal(cell.dataset.date));
      });
    }

    /* ================== 日历 → 当日记录 ================== */
    const dayModal      = document.getElementById('dayModal');
    const dayModalTitle = document.getElementById('dayModalTitle');
    const dayModalList  = document.getElementById('dayModalList');
    document.getElementById('dayModalClose').addEventListener('click', () => dayModal.classList.remove('show'));
    dayModal.addEventListener('click', e => { if (e.target === dayModal) dayModal.classList.remove('show'); });

    function openDayModal(dateStr) {
      const rs = records.filter(r => r.date === dateStr);
      const ymd = dateStr.split('-');
      dayModalTitle.textContent = `${ymd[0]} 年 ${parseInt(ymd[1], 10)} 月 ${parseInt(ymd[2], 10)} 日 的观剧`;

      if (!rs.length) {
        dayModalList.innerHTML = '<div class="day-empty">— 当天没有观剧记录 —</div>';
      } else {
        dayModalList.innerHTML = rs.map(r => {
          const stampColor = RATING_COLOR[r.rating] || 'var(--ink-soft)';
          const ratingText = r.rating || '—';
          /* 3 字及以上（如"人上人"/"拉完了"/"NPC"）用更小字号避免超出 36px 圆圈 */
          const isLong = ratingText.length > 2;
          return `
            <div class="day-item" data-id="${esc(r.id)}">
              <div class="di-stamp${isLong ? ' long' : ''}" style="color:${stampColor};">${esc(ratingText)}</div>
              <div style="flex:1; min-width:0;">
                <div class="di-name">${esc(r.name || '（无名称）')}</div>
                <div class="di-meta">${esc(r.method || '—')} ${r.theater ? '· ' + esc(r.theater) : ''}</div>
              </div>
            </div>
          `;
        }).join('');
        dayModalList.querySelectorAll('.day-item').forEach(item => {
          item.addEventListener('click', () => {
            dayModal.classList.remove('show');
            openDetail(item.dataset.id);
          });
        });
      }
      dayModal.classList.add('show');
    }

    /* ================== SD 日记渲染 ================== */
    function renderSD() {
      const list = [...sdRecords].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const listEl = document.getElementById('sdList');

      if (list.length === 0) {
        listEl.innerHTML = '<div class="empty">— 还没有 SD 记录，点右上角添加吧 —</div>';
        return;
      }

      listEl.innerHTML = list.map(r => {
        const dayHtml = r.date
          ? `<div class="timeline-date">
               <span class="d-day">${esc(formatDay(r.date))}</span>
               ${esc(r.date.substring(0, 4))}
             </div>`
          : `<div class="timeline-date">—</div>`;
        const relatedName = r.relatedShow
          ? (records.find(x => x.id === r.relatedShow) || {}).name || ''
          : '';
        const relatedHtml = relatedName
          ? `<div class="sd-related">关联剧目：${esc(relatedName)}</div>` : '';
        const imgs = Array.isArray(r.images) ? r.images.filter(Boolean) : [];
        const imgsHtml = imgs.length
          ? `<div class="sd-images">${imgs.map(u => `<img src="${esc(u)}" alt="">`).join('')}</div>` : '';
        const textHtml = r.text ? `<div class="sd-text">${esc(r.text)}</div>` : '';

        return `
          <div class="timeline-item" data-id="${esc(r.id)}">
            ${dayHtml}
            <div class="timeline-marker"><div class="timeline-dot"></div></div>
            <div class="timeline-card">
              <div class="sd-title">${esc(r.showName || '（无名称）')}</div>
              ${relatedHtml}
              ${imgsHtml}
              ${textHtml}
            </div>
          </div>
        `;
      }).join('');

      listEl.querySelectorAll('.timeline-item').forEach(item => {
        item.addEventListener('click', () => openSDDetail(item.dataset.id));
      });
    }

    /* ================== SD 详情 ================== */
    const sdDetailModal   = document.getElementById('sdDetailModal');
    const sdDetailContent = document.getElementById('sdDetailContent');
    function formatDayChinese(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      return parts.length === 3 ? `${parts[2]}` : '';
    }
    function formatDateChinese(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      return parts.length === 3 ? `${parts[0]} 年 ${parts[1]} 月` : '';
    }
    function openSDDetail(id) {
      const r = sdRecords.find(x => x.id === id);
      if (!r) return;
      const relatedName = r.relatedShow
        ? (records.find(x => x.id === r.relatedShow) || {}).name || ''
        : '';
      const imgs = Array.isArray(r.images) ? r.images.filter(Boolean) : [];

      sdDetailContent.innerHTML = `
        <div class="sd-detail-head">
          <div>
            <div class="sd-date-big">${formatDayChinese(r.date) || '—'}</div>
            <div class="sd-date-sub">${esc(formatDateChinese(r.date))}</div>
          </div>
        </div>
        <h2>${esc(r.showName || '（无名称）')}</h2>
        ${relatedName ? `<div class="sd-detail-related">关联剧目：${esc(relatedName)}</div>` : ''}
        ${imgs.length ? `
          <div class="sd-detail-images">
            ${imgs.map(u => `<img class="sd-detail-img" src="${esc(u)}" alt="" data-src="${esc(u)}">`).join('')}
          </div>
        ` : ''}
        ${r.text ? `<div class="sd-detail-text">${esc(r.text)}</div>` : ''}
        <div class="sd-detail-actions">
          <div class="left">
            <button type="button" class="btn btn-ghost" id="sdDetailClose">关闭</button>
            <button type="button" class="btn btn-danger" id="sdDetailDelete">删除</button>
          </div>
          <div class="right">
            <button type="button" class="btn btn-primary" id="sdDetailEdit">编辑</button>
          </div>
        </div>
      `;
      sdDetailModal.classList.add('show');

      /* 关闭 */
      document.getElementById('sdDetailClose').onclick = closeSDDetail;
      sdDetailModal.onclick = (e) => { if (e.target === sdDetailModal) closeSDDetail(); };

      /* 编辑：先关详情，再开表单 */
      document.getElementById('sdDetailEdit').onclick = () => {
        closeSDDetail();
        openSDForm(id);
      };

      /* 删除 */
      document.getElementById('sdDetailDelete').onclick = () => {
        if (!confirm('确认删除这条 SD 记录？')) return;
        sdRecords = sdRecords.filter(x => x.id !== id);
        saveSDRecords();
        renderSD();
        closeSDDetail();
      };

      /* 图片点击放大 */
      sdDetailContent.querySelectorAll('.sd-detail-img').forEach(img => {
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          openLightbox(img.dataset.src);
        });
      });
    }
    function closeSDDetail() { sdDetailModal.classList.remove('show'); }

    /* ================== 图片放大灯箱 ================== */
    const lightbox     = document.getElementById('lightbox');
    const lightboxImg  = document.getElementById('lightboxImg');
    const lightboxCls  = lightbox.querySelector('.lightbox-close');
    function openLightbox(src) {
      if (!src) return;
      lightboxImg.src = src;
      lightbox.classList.add('show');
    }
    function closeLightbox() {
      lightbox.classList.remove('show');
      lightboxImg.src = '';
    }
    lightboxCls.addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });
    lightbox.addEventListener('click', (e) => {
      /* 点击图片本身不关闭（避免误操作），点遮罩或 × 才关 */
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('show')) closeLightbox();
    });

    /* ================== 入口页 ================== */
    document.getElementById('entry').addEventListener('click', () => {
      document.getElementById('entry').classList.add('hidden');
      document.getElementById('app').style.display = 'block';
    });

    /* ================== Tab 栏事件 ================== */
    document.querySelectorAll('.tab-item').forEach(t => {
      t.addEventListener('click', () => switchView(t.dataset.view));
    });

    /* ================== 首页工具栏事件 ================== */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterType = btn.dataset.filter;
        render();
      });
    });
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sortType = btn.dataset.sort;
        render();
      });
    });
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('addBtn').addEventListener('click', () => openForm(null));
    document.getElementById('addSDBtn').addEventListener('click', () => openSDForm(null));

    /* ================== 剧目表单弹窗 ================== */
    const formModal = document.getElementById('formModal');
    const form = document.getElementById('recordForm');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const ratingPicker = document.getElementById('ratingPicker');

    function openForm(id) {
      editingId = id;
      currentRating = '';
      currentImage = null;
      imagePreview.style.display = 'none';
      imagePreview.src = '';
      imageInput.value = '';

      if (id) {
        const r = records.find(x => x.id === id);
        if (!r) return;
        document.getElementById('formTitle').textContent = '编辑记录';
        form.name.value     = r.name     || '';
        form.date.value     = r.date     || '';
        form.location.value = r.location || '';
        form.theater.value  = r.theater  || '';
        form.cast.value     = r.cast     || '';
        form.seat.value     = r.seat     || '';
        form.method.value   = r.method   || '线下';
        form.comment.value  = r.comment  || '';
        currentImage = r.image || null;
        currentRating = r.rating || '';
        if (r.image) { imagePreview.src = r.image; imagePreview.style.display = 'block'; }
      } else {
        document.getElementById('formTitle').textContent = '添加记录';
        form.reset();
        form.method.value = '线下';
      }
      ratingPicker.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', b.dataset.value === currentRating);
      });
      formModal.classList.add('show');
    }
    function closeForm() { formModal.classList.remove('show'); }
    document.getElementById('formCancel').addEventListener('click', closeForm);
    formModal.addEventListener('click', e => { if (e.target === formModal) closeForm(); });

    ratingPicker.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') {
        ratingPicker.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentRating = e.target.dataset.value;
      }
    });

    imageInput.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        currentImage = ev.target.result;
        imagePreview.src = currentImage;
        imagePreview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    /* ================== SD 图片：压缩 + 预览 ================== */
    function compressImage(file, maxSize = 1200, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > h && w > maxSize) { h = Math.round(h * (maxSize / w)); w = maxSize; }
            else if (h > maxSize)      { w = Math.round(w * (maxSize / h)); h = maxSize; }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderSDImagePreviews() {
      const wrap = document.getElementById('sdImagePreviews');
      wrap.innerHTML = currentSDImages.map((src, i) => `
        <div class="sd-img-item">
          <img src="${esc(src)}" alt="">
          <button type="button" class="sd-img-remove" data-idx="${i}" title="删除">×</button>
        </div>
      `).join('');
      wrap.querySelectorAll('.sd-img-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.dataset.idx, 10);
          currentSDImages.splice(i, 1);
          renderSDImagePreviews();
        });
      });
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      if (!currentRating) { alert('请选择一个评分'); return; }
      const data = {
        id: editingId || genId(),
        name: form.name.value.trim(),
        date: form.date.value,
        location: form.location.value.trim(),
        theater:  form.theater.value.trim(),
        cast:     form.cast.value.trim(),
        seat:     form.seat.value.trim(),
        method:   form.method.value,
        rating:   currentRating,
        comment:  form.comment.value.trim(),
        image:    currentImage
      };
      if (!data.name || !data.date) { alert('请填写剧名和日期'); return; }

      if (editingId) {
        const idx = records.findIndex(r => r.id === editingId);
        if (idx >= 0) records[idx] = data;
      } else {
        records.push(data);
      }
      saveRecords();
      render();
      closeForm();
    });

    /* ================== 剧目详情弹窗 ================== */
    const detailModal = document.getElementById('detailModal');
    const detailContent = document.getElementById('detailContent');

    function showDetail(id) {
      const r = records.find(x => x.id === id);
      if (!r) return;
      const key = RATING_KEY[r.rating] || '';
      const isLong = r.rating && r.rating.length > 2;
      const imageHtml = r.image ? `<img class="detail-image" src="${esc(r.image)}" alt="">` : '';
      const seatHtml = r.seat ? `<div class="detail-seat">座位号 ｜ ${esc(r.seat)}</div>` : '';
      const commentHtml = r.comment ? `<div class="detail-comment">${esc(r.comment)}</div>` : '';

      detailContent.innerHTML = `
        <div class="detail-head">
          <h2>${esc(r.name)}</h2>
          <div class="stamp s-${key} ${isLong ? 'long' : ''}">${esc(r.rating)}</div>
        </div>
        ${imageHtml}
        ${seatHtml}
        <div class="detail-row"><div class="k">日 期</div><div class="v">${esc(r.date)}</div></div>
        ${r.location ? `<div class="detail-row"><div class="k">地 点</div><div class="v">${esc(r.location)}</div></div>` : ''}
        ${r.theater  ? `<div class="detail-row"><div class="k">剧 院</div><div class="v">${esc(r.theater)}</div></div>` : ''}
        ${r.cast     ? `<div class="detail-row"><div class="k">卡 司</div><div class="v">${esc(r.cast)}</div></div>` : ''}
        <div class="detail-row"><div class="k">方 式</div><div class="v">${esc(r.method)}</div></div>
        ${commentHtml}
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="detailDelete">删除</button>
          <button type="button" class="btn btn-ghost" id="detailClose">关闭</button>
          <button type="button" class="btn btn-primary" id="detailEdit">编辑</button>
        </div>
      `;
      detailModal.classList.add('show');
      document.getElementById('detailClose').onclick = closeDetail;
      document.getElementById('detailEdit').onclick  = () => { closeDetail(); openForm(id); };
      document.getElementById('detailDelete').onclick = () => {
        if (confirm('确定要删除这条记录吗？')) {
          records = records.filter(x => x.id !== id);
          saveRecords();
          render();
          closeDetail();
        }
      };
    }
    function closeDetail() { detailModal.classList.remove('show'); }
    detailModal.addEventListener('click', e => { if (e.target === detailModal) closeDetail(); });

    /* ================== SD 表单弹窗 ================== */
    const sdFormModal = document.getElementById('sdFormModal');
    const sdForm = document.getElementById('sdForm');
    const sdRelatedSelect = document.getElementById('sdRelatedSelect');

    function openSDForm(id) {
      editingSDId = id;
      // 动态填充关联剧目下拉
      sdRelatedSelect.innerHTML = '<option value="">— 无 —</option>' +
        records.map(r => `<option value="${esc(r.id)}">${esc(r.name)}</option>`).join('');

      // 重置 SD 图片状态
      currentSDImages = [];
      document.getElementById('sdImageInput').value = '';

      if (id) {
        const r = sdRecords.find(x => x.id === id);
        if (!r) return;
        document.getElementById('sdFormTitle').textContent = '编辑 SD';
        sdForm.date.value = r.date || '';
        sdForm.showName.value = r.showName || '';
        sdForm.relatedShow.value = r.relatedShow || '';
        sdForm.text.value = r.text || '';
        currentSDImages = Array.isArray(r.images) ? [...r.images] : [];
      } else {
        document.getElementById('sdFormTitle').textContent = '添加 SD';
        sdForm.reset();
        sdForm.relatedShow.value = '';
      }
      renderSDImagePreviews();
      sdFormModal.classList.add('show');
    }
    function closeSDForm() { sdFormModal.classList.remove('show'); }
    document.getElementById('sdFormCancel').addEventListener('click', closeSDForm);
    sdFormModal.addEventListener('click', e => { if (e.target === sdFormModal) closeSDForm(); });

    /* SD 图片选择：多张 + 自动压缩 */
    document.getElementById('sdImageInput').addEventListener('change', async e => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      const remain = SD_MAX_IMAGES - currentSDImages.length;
      if (remain <= 0) {
        alert(`最多上传 ${SD_MAX_IMAGES} 张图片`);
        e.target.value = '';
        return;
      }
      const toProcess = files.slice(0, remain);
      for (const file of toProcess) {
        try {
          const compressed = await compressImage(file);
          currentSDImages.push(compressed);
        } catch (err) {
          console.error('图片读取失败', err);
        }
      }
      renderSDImagePreviews();
      e.target.value = '';   /* 清空，允许再次选择相同文件 */
    });

    /* SD 保存：显式 click 处理（避免 form submit 兼容问题） */
    function saveSDRecord() {
      try {
        const dateVal    = sdForm.date.value;
        const showNameVal = sdForm.showName.value.trim();
        if (!dateVal || !showNameVal) {
          alert('请填写日期和演出名称');
          return;
        }
        const data = {
          id: editingSDId || genSDId(),
          date: dateVal,
          showName: showNameVal,
          relatedShow: sdForm.relatedShow.value || '',
          images: [...currentSDImages],
          text: sdForm.text.value.trim()
        };

        if (editingSDId) {
          const idx = sdRecords.findIndex(r => r.id === editingSDId);
          if (idx >= 0) sdRecords[idx] = data;
        } else {
          sdRecords.push(data);
        }
        saveSDRecords();
        renderSD();
        closeSDForm();
      } catch (err) {
        console.error('SD 保存失败：', err);
        alert('SD 保存失败：' + (err && err.message ? err.message : err));
      }
    }
    document.getElementById('sdFormSave').addEventListener('click', saveSDRecord);
    /* 兼容回车提交 */
    sdForm.addEventListener('submit', e => { e.preventDefault(); saveSDRecord(); });

    /* ================== 数据导入导出 ================== */
    function exportAllData() {
      const hasRecords = Array.isArray(records) && records.length > 0;
      const hasSD = Array.isArray(sdRecords) && sdRecords.length > 0;
      if (!hasRecords && !hasSD) {
        alert('暂无数据可导出');
        return;
      }
      const data = {
        exportDate: new Date().toISOString(),
        version: '1.0',
        records: records || [],
        sd: sdRecords || []
      };
      try {
        const jsonStr = JSON.stringify(data, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        a.download = `看剧手账_备份_${y}-${m}-${day}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (err) {
        alert('导出失败：' + err.message);
      }
    }

    function triggerImport() {
      /* 兼容方案：label + for 属性已能原生触发；此函数作为兜底 */
      const input = document.getElementById('importFileInput');
      try { input.click(); } catch (e) { /* 静默失败 */ }
    }

    function handleImportFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data || typeof data !== 'object' || !('records' in data) || !('sd' in data)) {
            alert('文件格式错误，请选择正确的备份文件');
            return;
          }
          if (!Array.isArray(data.records) || !Array.isArray(data.sd)) {
            alert('文件格式错误，请选择正确的备份文件');
            return;
          }
          if (!confirm('导入将覆盖当前所有数据，确认继续？')) return;
          /* 完全覆盖：写 localStorage 并刷新内存数据 */
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data.records));
          localStorage.setItem(SD_STORAGE_KEY, JSON.stringify(data.sd));
          alert('导入成功');
          /* 刷新页面以确保所有视图显示最新数据 */
          location.reload();
        } catch (err) {
          alert('文件格式错误，请选择正确的备份文件');
        }
      };
      reader.onerror = function () {
        alert('读取文件失败，请重试');
      };
      reader.readAsText(file, 'UTF-8');
    }

    document.getElementById('exportDataBtn').addEventListener('click', exportAllData);
    /* 导入：label 的 for 属性已能原生触发，click 监听仅为兜底（部分 Android 浏览器需手动 click） */
    const importLabel = document.getElementById('importLabel');
    if (importLabel) importLabel.addEventListener('click', triggerImport);
    document.getElementById('importFileInput').addEventListener('change', function (e) {
      const file = e.target.files && e.target.files[0];
      handleImportFile(file);
      /* 处理完后清空 value 以便能重复选择同一文件 */
      e.target.value = '';
    });

    /* ================== 启动 ================== */
    loadRecords();
    loadSDRecords();
    switchView('home');
  </script>
</body>
</html>
